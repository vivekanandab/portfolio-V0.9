<div id="ai-terminal" class="ai-terminal-closed">
    <div class="terminal-header">
        <span class="terminal-title">NG Bot // System Access</span>
        <button id="toggle-terminal" class="terminal-btn">_</button>
    </div>
    <div class="terminal-body" id="chat-box">
        <div class="message ai-message">
            <span class="prompt">>></span> System initialized. I am NG Bot (Nanda Gadi Bot). Ask me about Nanda's ML pipelines, GCP deployments, or project metrics.
        </div>
    </div>
    <div class="terminal-footer">
        <span class="prompt">>></span>
        <input type="text" id="chat-input" placeholder="Query repository data..." autocomplete="off">
        <button id="send-chat" class="terminal-btn">EXECUTE</button>
    </div>
</div>
